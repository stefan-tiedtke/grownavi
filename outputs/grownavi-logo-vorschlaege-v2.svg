<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="620" viewBox="0 0 1600 620" role="img" aria-labelledby="title desc">
  <title id="title">Drei neue Logo-Vorschläge für GROWNAVI.de mit schlanken Cannabisblättern</title>
  <desc id="desc">Drei leichte Vektorlogos: Navinadel, Blattorbit und Nordblatt.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#173f35" flood-opacity=".09"/>
    </filter>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#79ad77"/>
      <stop offset="1" stop-color="#286c4b"/>
    </linearGradient>
    <path id="slimLeaflet" d="M0 0 C-3-17-8-31-6-48L-11-43-8-57-13-51-9-68-15-61-10-80-16-73C-13-94-7-114 0-136 7-114 13-94 16-73L10-80 15-61 9-68 13-51 8-57 11-43C8-31 3-17 0 0Z"/>
    <g id="sevenLeaf">
      <use href="#slimLeaflet" transform="rotate(-64) scale(.58 .66)"/>
      <use href="#slimLeaflet" transform="rotate(-43) scale(.72 .78)"/>
      <use href="#slimLeaflet" transform="rotate(-22) scale(.88 .91)"/>
      <use href="#slimLeaflet"/>
      <use href="#slimLeaflet" transform="rotate(22) scale(.88 .91)"/>
      <use href="#slimLeaflet" transform="rotate(43) scale(.72 .78)"/>
      <use href="#slimLeaflet" transform="rotate(64) scale(.58 .66)"/>
      <path d="M0 0V42" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
    </g>
    <g id="wordmark">
      <text x="235" y="347" text-anchor="middle" fill="#173f35" font-family="Iowan Old Style,Georgia,serif" font-size="39" font-weight="700">GROWNAVI<tspan fill="#d69b32">.de</tspan></text>
    </g>
  </defs>

  <rect width="1600" height="620" fill="#f7f4ea"/>
  <text x="70" y="70" fill="#173f35" font-family="Avenir Next,Segoe UI,sans-serif" font-size="28" font-weight="800" letter-spacing="4">GROWNAVI.DE · LOGO-RICHTUNGEN II</text>

  <!-- 1: Navi needle -->
  <g transform="translate(55 110)" filter="url(#shadow)">
    <rect width="470" height="450" rx="36" fill="#fffdf7" stroke="#173f35" stroke-opacity=".10"/>
    <g transform="translate(235 190)">
      <circle r="112" fill="#edf3e9" stroke="#173f35" stroke-width="5"/>
      <path d="M0-112V-94M0 94V112M-112 0H-94M94 0H112" stroke="#d69b32" stroke-width="5" stroke-linecap="round"/>
      <path d="M0-106 11-80 0-86-11-80Z" fill="#d69b32"/>
      <g transform="translate(0 45) scale(.69)" fill="url(#green)" color="#286c4b">
        <use href="#sevenLeaf"/>
      </g>
      <circle r="5" fill="#173f35"/>
    </g>
    <use href="#wordmark"/>
    <text x="235" y="390" text-anchor="middle" fill="#557168" font-family="Avenir Next,Segoe UI,sans-serif" font-size="18" font-weight="700" letter-spacing="2">01 · NAVINADEL</text>
    <text x="235" y="422" text-anchor="middle" fill="#71857e" font-family="Avenir Next,Segoe UI,sans-serif" font-size="15">klar · botanisch · präzise</text>
  </g>

  <!-- 2: Leaf orbit -->
  <g transform="translate(565 110)" filter="url(#shadow)">
    <rect width="470" height="450" rx="36" fill="#fffdf7" stroke="#173f35" stroke-opacity=".10"/>
    <g transform="translate(235 190)">
      <circle r="108" fill="#edf3e9"/>
      <path d="M-98 43A108 108 0 0 1 74-80" fill="none" stroke="#173f35" stroke-width="7" stroke-linecap="round"/>
      <path d="M71-93 95-91 82-70Z" fill="#173f35"/>
      <path d="M98-43A108 108 0 0 1-74 80" fill="none" stroke="#d69b32" stroke-width="7" stroke-linecap="round"/>
      <circle cx="-79" cy="81" r="9" fill="#d69b32" stroke="#fffdf7" stroke-width="4"/>
      <g transform="translate(0 45) scale(.68)" fill="url(#green)" color="#286c4b">
        <use href="#sevenLeaf"/>
      </g>
    </g>
    <use href="#wordmark"/>
    <text x="235" y="390" text-anchor="middle" fill="#557168" font-family="Avenir Next,Segoe UI,sans-serif" font-size="18" font-weight="700" letter-spacing="2">02 · BLATTORBIT</text>
    <text x="235" y="422" text-anchor="middle" fill="#71857e" font-family="Avenir Next,Segoe UI,sans-serif" font-size="15">modern · fließend · eigenständig</text>
  </g>

  <!-- 3: North leaf -->
  <g transform="translate(1075 110)" filter="url(#shadow)">
    <rect width="470" height="450" rx="36" fill="#fffdf7" stroke="#173f35" stroke-opacity=".10"/>
    <g transform="translate(235 190)">
      <path d="M0-121 27-78 10-84V-52H-10V-84L-27-78Z" fill="#d69b32"/>
      <path d="M-94 83C-59 57-51 26-18 10 10-4 38 10 60-13" fill="none" stroke="#173f35" stroke-width="6" stroke-linecap="round" stroke-dasharray="1 17"/>
      <circle cx="-95" cy="83" r="10" fill="#173f35"/>
      <circle r="99" fill="none" stroke="#173f35" stroke-opacity=".14" stroke-width="3"/>
      <g transform="translate(0 50) scale(.70)" fill="url(#green)" color="#286c4b">
        <use href="#sevenLeaf"/>
      </g>
    </g>
    <use href="#wordmark"/>
    <text x="235" y="390" text-anchor="middle" fill="#557168" font-family="Avenir Next,Segoe UI,sans-serif" font-size="18" font-weight="700" letter-spacing="2">03 · NORDBLATT</text>
    <text x="235" y="422" text-anchor="middle" fill="#71857e" font-family="Avenir Next,Segoe UI,sans-serif" font-size="15">leicht · richtungsweisend · ruhig</text>
  </g>
</svg>
